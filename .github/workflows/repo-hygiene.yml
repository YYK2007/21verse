name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-hygiene:
    name: Repository hygiene
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Run repository hygiene checks
        shell: pwsh
        run: .\tools\test-repo-hygiene.ps1
